# Build and push maizegenetics/rtassel_docker to Docker Hub when a release tag is pushed,
# or manually via workflow_dispatch (e.g. rebuild without a new tag).
name: Publish Docker image

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "rTASSEL Git tag to build (e.g. v0.12.0)"
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building maizegenetics/rtassel_docker for rTASSEL $TAG"

      - name: Checkout rTASSEL at tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        run: |
          IMAGE=maizegenetics/rtassel_docker
          docker build \
            --build-arg "RTASSEL_TAG=${TAG}" \
            -f docker/Dockerfile \
            -t "${IMAGE}:${TAG}" \
            -t "${IMAGE}:latest" \
            .
          docker push "${IMAGE}:${TAG}"
          docker push "${IMAGE}:latest"
